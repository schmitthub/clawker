# Reference: Node.js project config
# Manually maintained — may lag behind schema. Fetch
# https://docs.clawker.dev/configuration for field-level details.
agent:
  claude_code:
    config:
      strategy: copy
    use_host_auth: true
    mount_projects: true
  editor: vim
  enable_shared_dir: true
  env_file:
    - .env
  from_env:
    - GH_TOKEN
    - CONTEXT7_API_KEY
  post_init: |
    claude mcp add -s local serena -- uvx --from git+https://github.com/oraios/serena@e9d21915660a66f8532260c527ab6afae94a6bd5 serena start-mcp-server --context claude-code --project "$(pwd)" --enable-web-dashboard false
    claude mcp add -s user --header "CONTEXT7_API_KEY: $CONTEXT7_API_KEY" --transport http context7 https://mcp.context7.com/mcp
    claude mcp add -s user -t http deepwiki https://mcp.deepwiki.com/mcp
  # pre_run runs on EVERY start (run/start/restart), in the workdir, right before
  # Claude Code. Use for deps that must re-sync each boot (post_init runs once and
  # can't). Canonical case: node_modules in a tmpfs, or package.json drift.
  # Non-zero exit is fatal (container won't reach ready).
  pre_run: |
    pnpm install
build:
  # Node + npm are baked into every clawker image (current LTS line) and already
  # on PATH — you do NOT install Node yourself. nvm is also set up; to switch
  # versions at runtime: `nvm install <ver> && nvm use <ver>`.
  #
  # Build-time RUN steps already have the baked node on PATH. To build against a
  # different version, source nvm first:
  #   . "$NVM_DIR/nvm.sh" && nvm install <ver> && nvm use <ver>
  image: buildpack-deps:bookworm-scm
  packages:
    - ripgrep
    - ca-certificates
    - openssh-client
  instructions:
    user_run:
      - curl -LsSf https://astral.sh/uv/install.sh | sh
      - uv tool install pre-commit --with pre-commit-uv
      # Global npm installs land on the agent's PATH (baked node).
      - npm install -g pnpm typescript
security:
  docker_socket: false
  firewall:
    add_domains:
      - registry.npmjs.org
      - github.com
      - api.github.com
      - docs.astro.build
      - mcp.deepwiki.com
      - mcp.context7.com
      - files.pythonhosted.org
      - api.cloudflare.com
    rules:
      - action: allow
        dst: github.com
        port: 22
        proto: ssh
      - action: allow
        dst: raw.githubusercontent.com
        port: 443
        proto: tls
        path_default: deny
        path_rules:
          - path: /schmitthub/clawker/
            action: allow
    git_credentials:
      copy_git_config: true
      forward_gpg: true
      forward_https: true
      forward_ssh: true
workspace:
  default_mode: bind
