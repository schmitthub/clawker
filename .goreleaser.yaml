version: 2

project_name: clawker

# We do NOT run `go generate` or `go mod tidy` from goreleaser. The four
# embedded linux binaries are produced by `make release-embeds` as a dedicated
# workflow step BEFORE goreleaser is invoked (see .github/workflows/release.yml).
# Running it here too would double the cold-runner build time. The release-embeds
# step stages binaries under embeds/{amd64,arm64}/ which goreleaser's per-build
# hooks below pull into the per-package internal/.../assets/ paths.

# Two build IDs, one per linux embed arch. Each has a `hooks.pre` that copies
# the matching arch's staged embeds into the per-package go:embed paths
# immediately before that build's `go build` runs. The two build IDs share the
# same internal/.../assets/ paths — the workflow MUST invoke goreleaser with
# `--parallelism 1`, otherwise build B's pre-hook would overwrite build A's
# staged embeds mid-compile, silently producing archives whose embedded
# binaries don't match the archive's advertised arch.
#
# Each build ID emits two outputs (linux + darwin) for its arch, since the host
# CLI cross-compiles freely (CGO_ENABLED=0, pure Go) and embeds are linux-only
# regardless of host CLI OS — they run inside Linux containers under Docker.
builds:
  - id: clawker-amd64
    main: ./cmd/clawker
    binary: clawker
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - -s -w
      - -X github.com/schmitthub/clawker/internal/build.Version={{.Version}}
      - -X github.com/schmitthub/clawker/internal/build.Date={{.CommitDate}}
      - -X github.com/schmitthub/clawker/internal/build.Revision={{.FullCommit}}
    hooks:
      pre:
        - cmd: make stage-embeds-amd64

  - id: clawker-arm64
    main: ./cmd/clawker
    binary: clawker
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - arm64
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - -s -w
      - -X github.com/schmitthub/clawker/internal/build.Version={{.Version}}
      - -X github.com/schmitthub/clawker/internal/build.Date={{.CommitDate}}
      - -X github.com/schmitthub/clawker/internal/build.Revision={{.FullCommit}}
    hooks:
      pre:
        - cmd: make stage-embeds-arm64

archives:
  - id: default
    # Both build IDs feed this single archive set so we get one archive per
    # (os, arch) regardless of which build ID produced the binary.
    ids:
      - clawker-amd64
      - clawker-arm64
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

homebrew_casks:
  - name: clawker
    ids:
      - default
    binaries:
      - clawker
    repository:
      owner: schmitthub
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/schmitthub/clawker
    description: "Development containers for AI coding agents"
    license: "AGPL-3.0-or-later"
    hooks:
      post:
        install: |
          if OS.mac?
          system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/clawker"]
          end

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

sboms:
  - artifacts: archive

signs:
  - cmd: cosign
    artifacts: checksum
    output: true
    signature: "${artifact}.sigstore.json"
    args:
      - "sign-blob"
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - Merge pull request
      - Merge branch
  # Group the auto commit log by conventional-commit prefix. Order is the
  # display order; the first matching group wins, so the catch-all "Other"
  # (order 99) must sort last. Squash-merge collapses each PR to its title, so
  # the regex matches the title prefix (the leading `.*?` tolerates an optional
  # scope/emoji preamble). The Dependencies group is listed before Features/Fixes
  # so `fix(deps)` / `build(deps)` land in Dependencies rather than Bug Fixes.
  groups:
    - title: "📦 Dependencies"
      regexp: '^.*?(deps|build\(deps\))'
      order: 0
    - title: "🚀 Features"
      regexp: '^.*?feat(\(.+\))??!?:'
      order: 1
    - title: "🐛 Bug Fixes"
      regexp: '^.*?fix(\(.+\))??!?:'
      order: 2
    - title: "⚡ Performance"
      regexp: '^.*?perf(\(.+\))??!?:'
      order: 3
    - title: Other
      order: 99

release:
  github:
    owner: schmitthub
    name: clawker
  prerelease: auto
  name_template: "{{.ProjectName}} v{{.Version}}"
  # Curated release-notes header is supplied at release time by the workflow
  # via `goreleaser release --release-header <file>`, extracted from the
  # committed CHANGELOG.md. GoReleaser prepends it above the auto commit groups
  # generated by the `changelog:` block (body = header → changelog → footer).
  # A tag with no curated entry yields an empty header file (no-op), leaving
  # just the auto commit groups.
