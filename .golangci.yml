run:
  timeout: 10m
  issues-exit-code: 1
  tests: true

linters:
  # STRICT: Enable everything by default. 
  # Note: This means your CI might break when golangci-lint updates, 
  # but it guarantees the AI is checked against every new rule.
  enable-all: true
  disable:
    # --- DEPRECATED LINTERS (Required to disable so the run doesn't crash) ---
    - deadcode
    - exhaustivestruct
    - golint
    - ifshort
    - interfacer
    - maligned
    - nosnakecase
    - scopelint
    - structcheck
    - varcheck
    - errname
    - execinquery
    - exportloopref

    # --- TOKEN BURNERS (Subjective formatting rules that cause AI infinite loops) ---
    - wsl         # AI struggles endlessly with whitespace/blank line rules
    - nlreturn    # Too pedantic about newlines before return statements
    - varnamelen  # AI will get stuck in a loop renaming 'i' to 'index'
    - lll         # Line length limits often conflict with AI's generation style
    - godox       # We don't care if the AI leaves TODOs; we want it to write code
    - tagalign    # AI is notoriously bad at aligning struct tags visually

linters-settings:
  errcheck:
    check-type-assertions: true
    # STRICT: Bans `_ = err`. The AI must explicitly handle the error.
    check-blank: true

  gocognit:
    # STRICT: AI naturally writes linear, monolithic code. 
    # This forces it to extract logic into smaller, testable functions.
    min-complexity: 15

  funlen:
    lines: 60
    statements: 40

  forbidigo:
    # STRICT: AI loves to panic or print instead of routing errors.
    forbid:
      - '^fmt\.Print.*$' # Forces AI to use your actual logger
      - '^panic$'        # Forces AI to return errors up the stack
      - '^os\.Exit$'     # Prevents abrupt process termination
      - '^log\.Fatal.*$' # Prevents standard logger fatal calls

  wrapcheck:
    # STRICT: Forces the AI to add context to errors (e.g., fmt.Errorf("doing x: %w", err))
    ignoreSigs:
      - .Errorf(
      - errors.New(
      - errors.Unwrap(
      - errors.Join(

  revive:
    severity: error
    rules:
      - name: unexported-return
      - name: time-naming
      - name: errorf
      - name: error-naming
      - name: error-strings
      - name: receiver-naming
      - name: context-as-argument
      - name: context-keys-type
      - name: import-shadowing

  govet:
    enable-all: true
    disable:
      # Prevents AI from infinitely reordering struct fields to save memory
      - fieldalignment

issues:
  # STRICT: Do not hide any default errors or cap the issue count.
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
