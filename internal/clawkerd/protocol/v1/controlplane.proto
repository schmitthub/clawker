syntax = "proto3";

package clawker.agent.v1;

option go_package = "github.com/schmitthub/clawker/internal/clawkerd/protocol/v1";

// ControlPlaneService is the RPC surface the clawker CLI calls on the
// containerized control plane. The CP owns privileged kernel state (BPF
// programs + pinned maps) and handles per-container firewall lifecycle.
//
// Transport in v1 is mTLS over Unix domain socket with a JWT bearer token
// in metadata per call (see internal/controlplane/authz.go). Every method
// is gated by a required scope in the gRPC authz interceptor.
//
// Method naming is responsibility-prefixed (...Firewall, ...Dns, ...) so
// future CP responsibilities (container lifecycle, image management,
// network orchestration) cluster naturally as they're added.
service ControlPlaneService {
  // Health is the readiness probe used by the firewall manager's
  // EnsureRunning gate after starting the clawker-cp container. No scope
  // required — public method.
  rpc Health(HealthRequest) returns (HealthResponse);

  // EnableContainerFirewall attaches BPF cgroup programs for a container
  // and populates its container_map entry with the routing configuration.
  // Requires scope firewall:admin.
  rpc EnableContainerFirewall(EnableContainerFirewallRequest) returns (EnableContainerFirewallResponse);

  // DisableContainerFirewall detaches BPF programs and removes the
  // container_map entry. Requires scope firewall:admin.
  rpc DisableContainerFirewall(DisableContainerFirewallRequest) returns (DisableContainerFirewallResponse);

  // BypassContainer sets the bypass flag on a container, letting its
  // egress traffic skip firewall enforcement. Requires scope firewall:admin.
  rpc BypassContainer(BypassContainerRequest) returns (BypassContainerResponse);

  // UnbypassContainer clears the bypass flag. Requires scope firewall:admin.
  rpc UnbypassContainer(UnbypassContainerRequest) returns (UnbypassContainerResponse);

  // SyncFirewallRoutes replaces the global route_map atomically with the
  // provided routes. Called on firewall rule changes. Requires scope
  // firewall:admin.
  rpc SyncFirewallRoutes(SyncFirewallRoutesRequest) returns (SyncFirewallRoutesResponse);

  // UpdateDnsCache writes a single dns_cache entry. Retained for diagnostic
  // use; the production DNS cache writer is the dnsbpf CoreDNS plugin.
  // Requires scope firewall:admin.
  rpc UpdateDnsCache(UpdateDnsCacheRequest) returns (UpdateDnsCacheResponse);

  // GarbageCollectDns iterates dns_cache and removes expired entries.
  // Returns the number cleared. Requires scope firewall:admin.
  rpc GarbageCollectDns(GarbageCollectDnsRequest) returns (GarbageCollectDnsResponse);

  // LookupContainer reads the container_map entry for a cgroup (diagnostics).
  // Requires scope firewall:admin.
  rpc LookupContainer(LookupContainerRequest) returns (LookupContainerResponse);

  // ResolveHostname performs a DNS lookup via the container's libc resolver.
  // Used by the firewall manager to resolve host.docker.internal from inside
  // the CP container's network namespace. Requires scope firewall:admin.
  rpc ResolveHostname(ResolveHostnameRequest) returns (ResolveHostnameResponse);
}

// ContainerFirewallConfig carries the fields formerly serialized as the
// enableArgs JSON payload passed to `ebpf-manager enable`. Mirrors the
// configuration that populates a BPF container_config entry.
message ContainerFirewallConfig {
  // envoy_ip is the dotted-decimal IPv4 of the firewall stack's Envoy container.
  string envoy_ip = 1;
  // coredns_ip is the dotted-decimal IPv4 of the firewall stack's CoreDNS container.
  string coredns_ip = 2;
  // gateway_ip is the dotted-decimal IPv4 of the clawker-net bridge gateway.
  string gateway_ip = 3;
  // cidr is the clawker-net subnet in CIDR notation (e.g. "172.20.0.0/24").
  string cidr = 4;
  // host_proxy_ip is the resolved IPv4 of host.docker.internal (optional).
  string host_proxy_ip = 5;
  // host_proxy_port is the host-proxy listener port (0 if unused).
  uint32 host_proxy_port = 6;
  // egress_port is the Envoy egress listener port the BPF programs redirect to.
  uint32 egress_port = 7;
}

// Route is one entry in the global route_map. Mirrors ebpf.Route.
message Route {
  // domain_hash is the FNV-1a hash of the normalized destination domain.
  uint32 domain_hash = 1;
  // dst_port is the original destination port (host byte order).
  uint32 dst_port = 2;
  // envoy_port is the Envoy listener port the BPF programs redirect to.
  uint32 envoy_port = 3;
}

// ContainerConfigSnapshot is a read-only view of a container_map entry.
message ContainerConfigSnapshot {
  string envoy_ip = 1;
  string coredns_ip = 2;
  string gateway_ip = 3;
  string net_addr = 4;
  string net_mask = 5;
  string host_proxy_ip = 6;
  uint32 host_proxy_port = 7;
  uint32 egress_port = 8;
}

// ---------------------------------------------------------------------------
// Method request/response messages
// ---------------------------------------------------------------------------

message HealthRequest {}
message HealthResponse {
  // ok is true when the CP has successfully loaded the BPF programs and
  // both listeners are serving.
  bool ok = 1;
}

message EnableContainerFirewallRequest {
  // container_id is the full Docker container ID.
  string container_id = 1;
  // cgroup_path is the absolute path under /sys/fs/cgroup identifying the
  // container's cgroup (e.g. /sys/fs/cgroup/docker/<id>). The CP validates
  // this path via ebpf.CgroupID to prevent path injection.
  string cgroup_path = 2;
  // config carries the Envoy/CoreDNS/gateway IPs, CIDR, and host-proxy
  // settings that populate the container_config BPF map entry.
  ContainerFirewallConfig config = 3;
}
message EnableContainerFirewallResponse {
  // cgroup_id is the inode ID the CP computed from cgroup_path.
  uint64 cgroup_id = 1;
}

message DisableContainerFirewallRequest {
  string cgroup_path = 1;
}
message DisableContainerFirewallResponse {
  uint64 cgroup_id = 1;
}

message BypassContainerRequest {
  string cgroup_path = 1;
  // timeout_seconds, if > 0, schedules an automatic Unbypass on the CP
  // after this many seconds. The timer lives in the CP process, so it
  // survives the caller exiting — critical for the `clawker firewall
  // bypass` CLI which may terminate before the timeout elapses.
  int64 timeout_seconds = 2;
}
message BypassContainerResponse {
  uint64 cgroup_id = 1;
}

message UnbypassContainerRequest {
  string cgroup_path = 1;
}
message UnbypassContainerResponse {
  uint64 cgroup_id = 1;
}

message SyncFirewallRoutesRequest {
  repeated Route routes = 1;
}
message SyncFirewallRoutesResponse {
  // applied is the number of routes that were written to route_map.
  uint32 applied = 1;
}

message UpdateDnsCacheRequest {
  // ip is the dotted-decimal IPv4 to key on.
  string ip = 1;
  // domain_hash is the FNV-1a hash of the resolved domain.
  uint32 domain_hash = 2;
  // ttl_seconds is the absolute TTL from the DNS response.
  uint32 ttl_seconds = 3;
}
message UpdateDnsCacheResponse {}

message GarbageCollectDnsRequest {}
message GarbageCollectDnsResponse {
  // removed is the number of expired entries cleared.
  uint32 removed = 1;
}

message LookupContainerRequest {
  string cgroup_path = 1;
}
message LookupContainerResponse {
  uint64 cgroup_id = 1;
  ContainerConfigSnapshot config = 2;
}

message ResolveHostnameRequest {
  string hostname = 1;
}
message ResolveHostnameResponse {
  // addresses is the list of resolved IPs. Each entry is a dotted-decimal
  // IPv4 or colon-separated IPv6 address.
  repeated string addresses = 1;
}
