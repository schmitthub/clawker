rules:
  - action: allow
    dst: api.anthropic.test
    port: 443
    proto: tls
  - action: allow
    dst: .claude.test
    port: 443
    proto: tls
  - action: allow
    dst: github.test
    port: 22
    proto: ssh
  - action: allow
    dst: github.test
    port: 443
    proto: tls
  - action: allow
    dst: api.github.test
    port: 443
    proto: tls
  - action: allow
    dst: registry-1.docker.test
    port: 443
    proto: tls
  - action: allow
    dst: proxy.golang.test
    port: 443
    proto: tls
  - action: allow
    dst: sum.golang.test
    port: 443
    proto: tls
  - action: allow
    dst: registry.npmjs.test
    port: 443
    proto: tls
  - action: allow
    dst: pypi.test
    port: 443
    proto: tls
  - action: allow
    dst: docs.clawker.test
    port: 443
    proto: tls
  # IP address rule
  - action: allow
    dst: "93.184.216.34"
    port: 443
    proto: tls
  # CIDR block rule
  - action: allow
    dst: "10.0.0.0/8"
    port: 443
    proto: tls
  # --- Test-specific rules below (not typical in production) ---
  # Explicit deny for testing deny logic
  - action: deny
    dst: evil.test
    port: 443
    proto: tls
  # Non-standard port for testing port matching
  - action: allow
    dst: registry.internal
    port: 8443
    proto: tls
  # HTTP with path rules for testing path matching
  - action: allow
    dst: api.example.test
    port: 80
    proto: http
    path_default: deny
    path_rules:
      - path: "/v1/"
        action: allow
      - path: "/v1/admin/"
        action: deny
      - path: "/health"
        action: allow
  # HTTP without path rules
  - action: allow
    dst: cdn.example.test
    port: 80
    proto: http
  # Regex (~) path rules — must enforce identically to Envoy safe_regex.
  # Allowlist: only the two exact users (with optional trailing slash); the
  # full-string anchor is what blocks the /users/<name>-evil prefix bypass.
  - action: allow
    dst: allowlist.example.test
    port: 80
    proto: http
    path_default: deny
    path_rules:
      - path: "~/users/(clawker|anthropic)/?"
        action: allow
  # Denylist with default-allow: the regex deny must match, otherwise the host
  # proxy would silently allow a path Envoy denies (the exfil direction).
  - action: allow
    dst: denylist.example.test
    port: 80
    proto: http
    path_default: allow
    path_rules:
      - path: "~/admin(/.*)?"
        action: deny
  # End-anchored regex with NO optional trailing slash: the canonical form of
  # the request path is security-significant. "/blog/." and "/blog/x/.." both
  # resolve to the directory "/blog/" (RFC 3986 remove_dot_segments / Envoy
  # normalize_path), which "~/blog$" does NOT match — the host proxy must DENY
  # them, matching Envoy, or the host browser fetches a denied directory.
  - action: allow
    dst: anchored.example.test
    port: 80
    proto: http
    path_default: deny
    path_rules:
      - path: "~/blog$"
        action: allow
