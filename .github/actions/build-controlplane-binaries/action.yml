name: Build embedded control plane binaries
description: >
  Builds the `clawkerd`, `clawker-cp`, `ebpf-manager`, and `coredns-clawker`
  Linux binaries via plain CGO_ENABLED=0 Go cross-compiles, and materializes
  the bpf2go-generated Go wrappers at
  `internal/controlplane/firewall/ebpf/clawker_*_bpfel.{go,o}` by running
  `go generate` against the pinned BPF toolchain (clang/llvm/libbpf-dev/
  linux-libc-dev — installed by `make bpf-deps`).

  This is the one-stop prerequisite for any CI job that needs to compile,
  lint, vet, or otherwise analyze the full Go module tree. Embed targets
  hit on a Go build of the whole module:

  - `internal/clawkerd` `go:embed`'s `clawkerd` (per-container daemon)
  - `internal/controlplane/cpboot` `go:embed`'s `clawker-cp` + `ebpf-manager`
  - `internal/controlplane/firewall` `go:embed`'s `coredns-clawker`
  - `internal/controlplane/firewall/ebpf/manager.go` references types
    declared in the bpf2go wrappers

  Build order: `clawkerd-binary` MUST come before `cp-binary` because
  `cmd/clawker-cp` transitively imports `internal/clawkerd` via
  `internal/docker` → `internal/bundler`, so the `clawker-cp` Go build
  refuses to compile until the `//go:embed assets/clawkerd` target exists
  on disk. The Makefile encodes this dependency explicitly on `$(CP_BINARY)`,
  but listing the targets in dependency order here keeps the intent visible
  to a future maintainer.

  Jobs that touch the whole module and skip this step will fail with
  `undefined: clawkerRouteKey` or missing `go:embed` targets.

  Linux-only: the `make bpf-deps` step is gated on `runner.os == 'Linux'`.
  macOS hosts route the bpf2go path through `Dockerfile.controlplane`
  instead (handled by the Makefile, not this action); no CI caller uses
  macOS runners today.

  Ordering rule: call this AFTER `actions/checkout`, and BEFORE any tool
  that does its own working-tree checkout (e.g. `golang/govulncheck-action`
  clobbers whatever's on disk — you can't use it with this). For those
  tools, install and run them manually after this step instead.

inputs:
  go-version-file:
    description: Path to go.mod for the actions/setup-go go-version-file input.
    required: false
    default: go.mod

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: ${{ inputs.go-version-file }}

    # Install pinned BPF toolchain (clang/llvm/libbpf-dev/linux-libc-dev) so
    # `go generate ./internal/controlplane/firewall/ebpf/...` — invoked by
    # the bpf-bindings prereq below — can drive bpf2go's native compile +
    # llvm-strip path. macOS dev routes through Dockerfile.controlplane
    # instead; this action only runs on Linux runners.
    - name: Install BPF toolchain
      if: runner.os == 'Linux'
      shell: bash
      run: sudo make bpf-deps

    - name: Build embedded control plane binaries
      shell: bash
      run: make ebpf-binary coredns-binary clawkerd-binary cp-binary
