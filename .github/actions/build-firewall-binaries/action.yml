name: Build embedded firewall binaries
description: >
  Builds the `ebpf-manager` and `coredns-clawker` Linux binaries via the
  pinned `Dockerfile.firewall` multi-stage build, and materializes the
  bpf2go-generated Go wrappers at `internal/ebpf/clawker_*_bpfel.{go,o}`.

  This is the one-stop prerequisite for any CI job that needs to compile,
  lint, vet, or otherwise analyze the full Go module tree — `internal/firewall`
  uses `go:embed` on the two Linux binaries, and `internal/ebpf/manager.go`
  references types declared in the bpf2go wrappers. Jobs that touch the
  whole module and skip this step will fail with `undefined: clawkerRouteKey`
  or missing `go:embed` targets.

  Ordering rule: call this AFTER `actions/checkout`, and BEFORE any tool
  that does its own working-tree checkout (e.g. `golang/govulncheck-action`
  clobbers whatever's on disk — you can't use it with this). For those
  tools, install and run them manually after this step instead.

inputs:
  go-version-file:
    description: Path to go.mod for the actions/setup-go go-version-file input.
    required: false
    default: go.mod

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: ${{ inputs.go-version-file }}

    - name: Build embedded firewall binaries
      shell: bash
      run: make ebpf-binary coredns-binary
