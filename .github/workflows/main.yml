name: Main

on:
  push:
    branches: [main]

concurrency:
  group: main-${{ github.sha }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: read
  security-events: write
  actions: read

jobs:
  security:
    name: Security
    uses: ./.github/workflows/security.yml
    permissions:
      contents: read
      pull-requests: read
      security-events: write
      actions: read
    secrets: inherit

  lint:
    name: Lint
    uses: ./.github/workflows/lint.yml
    permissions:
      contents: read
      security-events: write
      actions: read

  test:
    name: Test
    uses: ./.github/workflows/test.yml
    permissions:
      contents: read

  licenses:
    name: Licenses
    uses: ./.github/workflows/licenses.yml
    permissions:
      contents: read

  docs:
    name: Docs
    uses: ./.github/workflows/docs.yml
    permissions:
      contents: read

  plugin-check:
    name: Detect plugin changes
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 2
      - id: diff
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^claude-plugin/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  plugin-release:
    name: Plugin Release
    needs: [plugin-check]
    if: needs.plugin-check.outputs.changed == 'true'
    uses: schmitthub/claude-plugins/.github/workflows/update-plugin.yml@fdbd6ffdc036b82f60656e70e35ce80e40f8ab07 # main
    with:
      plugin-name: clawker-support
      sha: ${{ github.sha }}
    secrets:
      marketplace-token: ${{ secrets.MARKETPLACE_TOKEN }}

  # Future: Integration test jobs will be added here.
  # Use `needs: [security, lint, test]` so integration tests only run
  # after fast checks pass (saves runner minutes on obvious failures).
  # Planned jobs (matching Makefile targets):
  #   test-commands, test-internals, test-acceptance, test-whail, test-agents
