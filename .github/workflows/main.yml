name: Main

on:
  push:
    branches: [main]

concurrency:
  group: main-${{ github.sha }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: read
  security-events: write
  actions: read

jobs:
  security:
    name: Security
    uses: ./.github/workflows/security.yml
    permissions:
      contents: read
      pull-requests: read
      security-events: write
      actions: read
    secrets: inherit

  lint:
    name: Lint
    uses: ./.github/workflows/lint.yml
    permissions:
      contents: read
      security-events: write
      actions: read

  test:
    name: Test
    uses: ./.github/workflows/test.yml
    permissions:
      contents: read

  licenses:
    name: Licenses
    uses: ./.github/workflows/licenses.yml
    permissions:
      contents: read

  docs:
    name: Docs
    uses: ./.github/workflows/docs.yml
    permissions:
      contents: read

  plugin:
    name: Plugin
    uses: ./.github/workflows/plugin.yml
    permissions:
      contents: read

  plugin-release:
    name: Plugin Release
    needs: [plugin]
    if: contains(join(github.event.commits.*.modified, ','), 'claude-plugin/') || contains(join(github.event.commits.*.added, ','), 'claude-plugin/')
    uses: schmitthub/claude-plugins/.github/workflows/update-plugin.yml@9b42ee720580c360c0476213227c1a639b1f507a # main
    with:
      plugin-name: clawker-support
      sha: ${{ github.sha }}
    secrets:
      marketplace-token: ${{ secrets.MARKETPLACE_TOKEN }}

  # Future: Integration test jobs will be added here.
  # Use `needs: [security, lint, test]` so integration tests only run
  # after fast checks pass (saves runner minutes on obvious failures).
  # Planned jobs (matching Makefile targets):
  #   test-commands, test-internals, test-acceptance, test-whail, test-agents
