name: Lint

on:
  workflow_call:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      # Build the embedded firewall binaries first. internal/firewall uses
      # go:embed on assets/ebpf-manager and assets/coredns-clawker, so
      # typecheck fails without these files being present.
      - name: Build embedded firewall binaries
        run: make ebpf-binary coredns-binary

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.9.0
          args: --output.sarif.path=golangci-lint.sarif

      - name: Upload golangci-lint SARIF
        if: always() && hashFiles('golangci-lint.sarif') != ''
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: golangci-lint.sarif
          category: golangci-lint
