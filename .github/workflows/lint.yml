name: Lint

on:
  workflow_call:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Build the embedded firewall binaries first. internal/firewall uses
      # go:embed on assets/ebpf-manager and assets/coredns-clawker and
      # internal/ebpf/manager.go references types from the bpf2go-generated
      # wrappers, so typecheck fails without these files on disk.
      # The composite action handles setup-go + make ebpf-binary coredns-binary.
      - name: Build embedded firewall binaries
        uses: ./.github/actions/build-firewall-binaries

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.9.0
          args: --output.sarif.path=golangci-lint.sarif

      - name: Upload golangci-lint SARIF
        if: always() && hashFiles('golangci-lint.sarif') != ''
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: golangci-lint.sarif
          category: golangci-lint
