name: Lint

on:
  workflow_call:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Build the embedded control plane binaries first. internal/controlplane/cpboot
      # go:embed's assets/clawker-cp + assets/ebpf-manager, internal/controlplane/firewall
      # go:embed's assets/coredns-clawker, and internal/controlplane/firewall/ebpf/manager.go
      # references types from the bpf2go-generated wrappers, so typecheck fails
      # without these files on disk. The composite action handles setup-go +
      # make bpf-deps + make ebpf-binary coredns-binary clawkerd-binary cp-binary.
      - name: Build embedded control plane binaries
        uses: ./.github/actions/build-controlplane-binaries

      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.9.0
          args: --output.sarif.path=golangci-lint.sarif

      - name: Upload golangci-lint SARIF
        if: always() && hashFiles('golangci-lint.sarif') != ''
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          sarif_file: golangci-lint.sarif
          category: golangci-lint
