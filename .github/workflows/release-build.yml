name: Release Build

# Reusable workflow that owns the build + attest steps. Tag validation lives in
# the caller (.github/workflows/release.yml); this file is invoked once per
# release after the caller's checks pass.
#
# SLSA Build Level 3 isolation: the Sigstore signing identity baked into the
# Fulcio cert's SAN URI anchors to THIS file's path+ref, NOT the caller's. The
# caller cannot inject steps into this job's context. Verify attestations
# against this workflow's identity:
#
#   gh attestation verify <artifact> --owner schmitthub \
#     --signer-workflow schmitthub/clawker/.github/workflows/release-build.yml
#
# Permissions are declared on the calling job in release.yml (reusable
# workflows inherit job permissions, not workflow-level permissions).

on:
  workflow_call:
    secrets:
      HOMEBREW_TAP_GITHUB_TOKEN:
        required: true
        description: Token for publishing the homebrew tap formula via goreleaser.

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      # Record the wall-clock job start so the SLSA v1 predicate's
      # runDetails.metadata.startedOn matches the actual build window
      # rather than the predicate-generation step's invocation time.
      - name: Record build start
        run: echo "BUILD_STARTED_ON=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      # Required for `make release-embeds`, which invokes `docker buildx build`
      # against the pinned multi-stage Dockerfile.controlplane to produce the
      # four embedded linux binaries (clawker-cp, ebpf-manager, coredns-clawker,
      # clawkerd) for both amd64 and arm64. ubuntu-latest ships with Docker;
      # this action wires up buildx.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      # Stages both linux arch embed sets under embeds/{amd64,arm64}/. The
      # subsequent goreleaser run consumes them via per-build-id pre-hooks
      # (.goreleaser.yaml -> hooks.pre -> make stage-embeds-<arch>).
      #
      # `make release-embeds` doesn't need version stamping — the embedded
      # binaries don't link internal/build. Final CLI version+date are
      # stamped by goreleaser's ldflags below.
      - name: Build linux embed sets
        run: make release-embeds

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      # `--parallelism 1` is REQUIRED. The two build IDs (clawker-amd64,
      # clawker-arm64) share the assets/ go:embed source paths and would race
      # on each other's pre-hooks under the default parallelism. Serializing
      # is cheap — host-Go cross-compile of ./cmd/clawker is ~5s per target.
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          distribution: goreleaser
          version: "v2.15.4"
          args: release --clean --parallelism 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      # Capture the bpf-builder stage's apt package closure (incl. transitive
      # deps pulled in by `apt-get install --no-install-recommends`) so the
      # SLSA v1 predicate's resolvedDependencies can enumerate every Debian
      # package that affected the BPF compile environment.
      #
      # Reuses the buildx cache populated by `make release-embeds`; marginal
      # cost is just the dpkg-query in a throwaway container (~1s).
      - name: Capture bpf-builder apt package closure
        run: bash scripts/capture-apt-packages.sh dist/apt-packages.txt

      # Build the 16-subject checksum file consumed by actions/attest below:
      #   4 archives + 4 unpacked CLI binaries + 8 linux embed binaries.
      # Forensic motivation: an investigator presented with a running
      # `clawker-cp` inside a CP container can extract it, hash it, and
      # verify against this attestation directly — answering "which binary
      # diverged" cryptographically rather than by elimination.
      - name: Build attestation subject list
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          bash scripts/release-subjects.sh "$VERSION"

      # Generate the enriched SLSA v1 build provenance predicate (full
      # resolvedDependencies inventory: source commit, base image digests,
      # apt package closure, Go toolchain, BPF sources, pinned action SHAs,
      # workflow/Makefile/Dockerfile/goreleaser content hashes, tool
      # versions). Replaces the thin auto-populated predicate that the
      # default GitHub build-provenance attestation emits.
      - name: Generate SLSA v1 provenance predicate
        run: |
          go run ./cmd/gen-provenance \
            --repo-uri "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --source-commit "${GITHUB_SHA}" \
            --source-ref "${GITHUB_REF}" \
            --workflow-ref "${GITHUB_WORKFLOW_REF}" \
            --builder-id "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/.github/workflows/release-build.yml@${GITHUB_REF}" \
            --repository-id "${GITHUB_REPOSITORY_ID}" \
            --repository-owner-id "${GITHUB_REPOSITORY_OWNER_ID}" \
            --event-name "${GITHUB_EVENT_NAME}" \
            --runner-environment "${RUNNER_ENVIRONMENT}" \
            --invocation-id "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/attempts/${GITHUB_RUN_ATTEMPT}" \
            --started-on "${BUILD_STARTED_ON}" \
            --finished-on "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --apt-packages dist/apt-packages.txt \
            --output dist/provenance-predicate.json

      # actions/attest@v4 in custom-predicate mode. predicate-type +
      # predicate-path tells the action to wrap our pre-built body in a
      # DSSE envelope and sign it via the runner's Sigstore OIDC token.
      # subject-checksums references the 16-subject file built above; the
      # action validates each subject's digest against the named file in
      # the workspace.
      - name: Attest build provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-checksums: ./dist/attestation-subjects.txt
          predicate-type: https://slsa.dev/provenance/v1
          predicate-path: ./dist/provenance-predicate.json
