name: Release Build

# Reusable workflow that owns the build + attest steps. Tag validation lives in
# the caller (.github/workflows/release.yml); this file is invoked once per
# release after the caller's checks pass.
#
# SLSA Build Level 3 isolation: the Sigstore signing identity baked into the
# Fulcio cert's SAN URI anchors to THIS file's path+ref, NOT the caller's. The
# caller cannot inject steps into this job's context. Verify attestations
# against this workflow's identity:
#
#   gh attestation verify <artifact> --owner schmitthub \
#     --signer-workflow schmitthub/clawker/.github/workflows/release-build.yml
#
# Permissions are declared on the calling job in release.yml (reusable
# workflows inherit job permissions, not workflow-level permissions).

on:
  workflow_call:
    secrets:
      HOMEBREW_TAP_GITHUB_TOKEN:
        required: true
        description: Token for publishing the homebrew tap formula via goreleaser.

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      # Install pinned BPF toolchain (clang/llvm/libbpf-dev/linux-libc-dev).
      # Versions are defined in the Makefile's BPF_APT_DEPS variable so the
      # macOS dev path (Dockerfile.controlplane) and CI stay aligned.
      - name: Install BPF toolchain
        run: sudo apt-get update && sudo make bpf-deps

      # Native build of the four linux/{amd64,arm64} embed binaries
      # (clawker-cp, clawkerd, ebpf-manager, coredns-clawker). Runs bpf2go
      # via `go generate` plus 4×2 plain Go cross-compiles; no Docker.
      # Outputs staged under embeds/{amd64,arm64}/ for goreleaser pre-hooks.
      - name: Build linux embed sets
        run: make release-embeds

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      # `--parallelism 1` is REQUIRED. The two build IDs (clawker-amd64,
      # clawker-arm64) share the assets/ go:embed source paths and would race
      # on each other's pre-hooks under the default parallelism. Serializing
      # is cheap — host-Go cross-compile of ./cmd/clawker is ~5s per target.
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          distribution: goreleaser
          version: "v2.15.4"
          args: release --clean --parallelism 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      # Single attestation covering the four release archives plus the eight
      # embed binaries. actions/attest@v4 auto-generates an SLSA v1 build
      # provenance predicate from GitHub Actions context (source commit,
      # workflow ref, builder ID, runner environment). That binding pins
      # everything in the source tree — Dockerfile.controlplane, Makefile
      # (BPF_APT_DEPS), .goreleaser.yaml, internal/controlplane/firewall/ebpf
      # (clang -cflags, bpf2go pin), workflow YAMLs (with their pinned action
      # SHAs), BPF C sources. SBOMs are emitted by goreleaser/syft as release
      # assets and signed via cosign; they don't need separate attestations.
      - name: Attest release artifacts
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: |
            dist/clawker_*.tar.gz
            embeds/amd64/*
            embeds/arm64/*
