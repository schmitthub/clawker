agent:
  claude_code:
    config:
      strategy: copy
    use_host_auth: true
  editor: nano
  enable_shared_dir: true
  env:
    CLAWKER_TEST_DIR: .clawkerlocal/.test-tmp
    NODE_USE_SYSTEM_CA: 1
  from_env:
    - GH_TOKEN
    - CONTEXT7_API_KEY
  post_init: |
    claude mcp add -s local serena -- uvx --from git+https://github.com/oraios/serena@e9d21915660a66f8532260c527ab6afae94a6bd5 serena start-mcp-server --context claude-code --project "$(pwd)" --enable-web-dashboard false
    claude mcp add -s user --header "CONTEXT7_API_KEY: $CONTEXT7_API_KEY" --transport http context7 https://mcp.context7.com/mcp
    claude mcp add -s user -t http deepwiki https://mcp.deepwiki.com/mcp
    claude mcp add -s local grafana -e GRAFANA_URL=http://grafana:3000 -e GRAFANA_USERNAME=admin -e GRAFANA_PASSWORD=admin -- uvx mcp-grafana@v0.11.3
build:
  image: golang:1.26-bookworm
  instructions:
    root_run:
      - |- 
        NODE_USE_SYSTEM_CA=1 && \
          npm install -g wscat
      - |-
        WEBSOCAT_VERSION=v1.14.1 && \
          ARCH=$(dpkg --print-architecture) && \
          case "$ARCH" in \
            amd64) WEBSOCAT_FILE="websocat.x86_64-unknown-linux-musl" SHA="66f8dd3a0394761556339117f8bb5123bddefd44e087af2a72ec22b0bd08d514" ;; \
            arm64) WEBSOCAT_FILE="websocat.aarch64-unknown-linux-musl" SHA="711a69576a2ff473fb01a90ffafb571c2ed019e55479d7ae71b12c2eadeb7011" ;; \
            *) echo "Unsupported architecture for websocat: $ARCH" >&2; exit 1 ;; \
          esac && \
          curl -fsSL -o /tmp/websocat "https://github.com/vi/websocat/releases/download/${WEBSOCAT_VERSION}/${WEBSOCAT_FILE}" && \
          echo "$SHA /tmp/websocat" | sha256sum -c - && \
          install -m 755 /tmp/websocat /usr/local/bin/websocat && \
          rm -f /tmp/websocat
      - |-
        GH_VERSION=2.89.0 && \
          ARCH=$(dpkg --print-architecture) && \
          GH_FILE="gh_${GH_VERSION}_linux_${ARCH}.tar.gz" && \
          CHECKSUMS_FILE="gh_${GH_VERSION}_checksums.txt" && \
          curl -fsSLO "https://github.com/cli/cli/releases/download/v${GH_VERSION}/${GH_FILE}" && \
          curl -fsSLO "https://github.com/cli/cli/releases/download/v${GH_VERSION}/${CHECKSUMS_FILE}" && \
          grep " ${GH_FILE}\$" "${CHECKSUMS_FILE}" | sha256sum -c - && \
          tar -C /usr/local -xzf "${GH_FILE}" --strip-components=1 && \
          rm -f "${GH_FILE}" "${CHECKSUMS_FILE}"
      - |-
        COSIGN_VERSION=v3.0.5 && \
          ARCH=$(dpkg --print-architecture) && \
          case "$ARCH" in \
            amd64) COSIGN_ARCH=amd64 ;; \
            arm64) COSIGN_ARCH=arm64 ;; \
            *) \
              echo "Unsupported architecture for Cosign: $ARCH" >&2; \
              exit 1; \
              ;; \
          esac && \
          COSIGN_FILE="cosign-linux-${COSIGN_ARCH}" && \
          CHECKSUMS_FILE="cosign_checksums.txt" && \
          curl -fsSLO "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/${COSIGN_FILE}" && \
          curl -fsSLO "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/${CHECKSUMS_FILE}" && \
          grep " ${COSIGN_FILE}\$" "${CHECKSUMS_FILE}" | sha256sum -c - && \
          install -m 755 "${COSIGN_FILE}" /usr/local/bin/cosign && \
          rm -f "${COSIGN_FILE}" "${CHECKSUMS_FILE}"
      - |-
        SYFT_VERSION=v1.42.3 && \
          ARCH=$(dpkg --print-architecture) && \
          case "$ARCH" in \
            amd64) SYFT_ARCH=amd64 ;; \
            arm64) SYFT_ARCH=arm64 ;; \
            armhf) SYFT_ARCH=armv7 ;; \
            *) \
              echo "Unsupported architecture for Syft: $ARCH" >&2; \
              exit 1; \
              ;; \
          esac && \
          SYFT_FILE="syft_${SYFT_VERSION#v}_linux_${SYFT_ARCH}.tar.gz" && \
          CHECKSUMS_FILE="syft_${SYFT_VERSION#v}_checksums.txt" && \
          curl -fsSLO "https://github.com/anchore/syft/releases/download/${SYFT_VERSION}/${SYFT_FILE}" && \
          curl -fsSLO "https://github.com/anchore/syft/releases/download/${SYFT_VERSION}/${CHECKSUMS_FILE}" && \
          grep " ${SYFT_FILE}\$" "${CHECKSUMS_FILE}" | sha256sum -c - && \
          tar -C /usr/local/bin -xzf "${SYFT_FILE}" syft && \
          rm -f "${SYFT_FILE}" "${CHECKSUMS_FILE}"
    user_run:
      - curl -LsSf https://astral.sh/uv/install.sh | sh
      - uv tool install pre-commit --with pre-commit-uv
      - go install golang.org/x/tools/gopls@latest
      - go install gotest.tools/gotestsum@latest
      - go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - go install golang.org/x/vuln/cmd/govulncheck@latest
      - go install golang.org/x/tools/cmd/goimports@latest
      - go install honnef.co/go/tools/cmd/staticcheck@latest
      - go install golang.org/dl/go1.25.8@latest && go1.25.8 download
      - go install github.com/matryer/moq@latest
      - go install github.com/goreleaser/goreleaser/v2@latest
      - uv tool install semgrep
  packages:
    - git
    - curl
    - ripgrep
    - less
    - procps
    - sudo
    - fzf
    - zsh
    - man-db
    - unzip
    - gnupg2
    - iproute2
    - dnsutils
    - aggregate
    - jq
    - nano
    - vim
    - wget
    - curl
    - locales
    - locales-all
    - iputils-ping
    - shellcheck
    - clang
    - llvm
    - libbpf-dev
    - bpftool
    - nodejs
    - npm
loop:
  calls_per_hour: 100
  completion_threshold: 2
  loop_delay_seconds: 3
  max_consecutive_test_loops: 3
  max_loops: 50
  output_decline_threshold: 70
  safety_completion_threshold: 5
  same_error_threshold: 5
  session_expiration_hours: 24
  skip_permissions: true
  stagnation_threshold: 3
  timeout_minutes: 15
security:
  docker_socket: false
  firewall:
    add_domains:
      - charm.land
      - code.gitea.io
      - golang.org
      - proxy.golang.org
      - sum.golang.org
      - gocloud.dev
      - gopkg.in
      - software.sslmate.com
      - cloud.google.com
      - sigs.k8s.io
      - google.golang.org
      - storage.googleapis.com
      - go.opentelemetry.io
      - go.uber.org
      - lukechampine.com
      - go.yaml.in
      - cel.dev
      - files.pythonhosted.org
      - code.claude.com
      - mcp.deepwiki.com
      - mcp.context7.com
      - pypi.org
      - semgrep.dev
      - registry.npmjs.org
      - github.com
      - api.github.com
      - release-assets.githubusercontent.com
      - docker.io
      - registry-1.docker.io
      - vuln.go.dev
      - production.cloudflare.docker.com
      - www.envoyproxy.io
      - goreleaser.com
      - tuf-repo.github.com
      - tuf-repo-cdn.sigstore.dev
      - rekor.sigstore.dev
      - fulcio.sigstore.dev
      - tmaproduction.blob.core.windows.net
    rules:
      - action: allow
        dst: github.com
        port: 22
        proto: ssh
      - action: allow
        dst: toolbox-data.anchore.io
        port: 443
        proto: tls
        path_default: deny
        path_rules:
          - path: /syft/releases/
            action: allow
      - action: allow
        dst: raw.githubusercontent.com
        port: 443
        proto: tls
        path_default: deny
        path_rules:
          - path: /anchore/syft/main/
            action: allow
          - path: /schmitthub/clawker/
            action: allow
          - path: /envoyproxy/
            action: allow
  git_credentials:
    copy_git_config: true
    forward_gpg: true
    forward_https: true
    forward_ssh: true
workspace:
  default_mode: bind
