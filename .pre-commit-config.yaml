# Pre-commit hooks — mirrors CI quality gates locally.
# Install: bash scripts/install-hooks.sh
# Run all: pre-commit run --all-files
# Run one: pre-commit run gitleaks --all-files

repos:
  # ── Security ──────────────────────────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: 83d9cd684c87d95d656c1458ef04895a7f1cbd8e  # frozen: v8.30.1
    hooks:
      - id: gitleaks
        args: [--baseline-path, gitleaks-report.json]
  - repo: local
    hooks:
      - id: semgrep
        name: Semgrep SAST
        # Expected version: 1.156.0 (must match CI image tag in security.yml)
        entry: semgrep scan --config p/golang --config p/security-audit --error
        language: system
        types: [go]
        pass_filenames: false
      - id: semgrep-actions
        name: Semgrep GitHub Actions
        # Scans workflow YAML: p/github-actions catches the pull_request_target
        # checkout (pwn-request); .semgrep/ adds the pull_request_target cache
        # (poisoning) rule. Separate hook so workflow edits are gated even when
        # no Go file changes. CI mirror: security.yml.
        entry: semgrep scan --config p/github-actions --config .semgrep/ --error
        language: system
        files: ^\.github/workflows/.*\.ya?ml$
        pass_filenames: false

  - repo: https://github.com/tekwizely/pre-commit-golang
    rev: f298c082154b2cb239fac06a4f452368e66e66dd # frozen: v1.0.0-rc.4
    hooks:
      - id: go-mod-tidy

  # ── Lint ──────────────────────────────────────────────────────────────────
  - repo: https://github.com/golangci/golangci-lint
    rev: c0d3ddc9cf3faa61a4e378e879ece580256d76e5  # frozen: v2.12.2
    hooks:
      - id: golangci-lint-full
        entry: golangci-lint run
        args: [--config, .golangci.yml]

  # ── Quality ─────────────────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: govulncheck
        name: govulncheck SCA
        # Pins GOTOOLCHAIN to the version in go.mod so stdlib vuln drift
        # caught by CI (which installs go.mod's pinned version) can't sneak
        # past a developer running a newer local toolchain.
        entry: scripts/govulncheck.sh
        language: system
        always_run: true
        pass_filenames: false

      - id: go-test
        name: Unit tests
        entry: make test
        language: system
        types: [go]
        pass_filenames: false

      - id: docs-check
        name: Generated docs freshness
        entry: make docs-check
        language: system
        files: ^(cmd/|internal/cmd/|internal/docs/|internal/config/schema\.go)
        pass_filenames: false

      - id: licenses-check
        name: NOTICE freshness
        entry: make licenses-check
        language: system
        # NOTICE derives from module deps AND in-repo LICENSE files
        # (vendored code), so trigger on either changing.
        files: ^go\.(mod|sum)$|(^|/)(LICENSE[^/]*|NOTICE[^/]*)$
        pass_filenames: false

      - id: claude-freshness
        name: Claude doc freshness (advisory)
        entry: bash -c 'bash scripts/check-claude-freshness.sh --strict --non-interactive --no-color | head -50 || true'
        language: system
        files: \.go$
        pass_filenames: false
        verbose: true

      - id: plugin-drift
        name: Plugin Dockerfile template drift check
        entry: bash -c 'diff internal/bundler/assets/Dockerfile.base.tmpl clawker-plugin/skills/clawker-support/reference/Dockerfile.base.tmpl && diff internal/bundler/assets/Dockerfile.harness-image.tmpl clawker-plugin/skills/clawker-support/reference/Dockerfile.harness-image.tmpl'
        language: system
        files: (internal/bundler/assets/Dockerfile\.(base|harness-image)\.tmpl|^clawker-plugin$)
        pass_filenames: false

